<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Say Hi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #eaecf5;
            --blob-blue: #bdd0f5;
            --blob-lavender: #ddd0f7;
            --blob-mint: #c5e8e0;
            --card-bg: rgba(255, 255, 255, 0.68);
            --card-border: rgba(255, 255, 255, 0.92);
            --text-body: #4a4a6a;
            --text-muted: #8888a8;
            --fb-blue: #1877F2;
        }

        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        html { height: 100%; }

        body {
            font-family: 'Figtree', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── BACKGROUND BLOBS ── */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(72px);
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 580px; height: 580px;
            background: var(--blob-blue);
            top: -160px; right: -100px;
            animation: float1 20s ease-in-out infinite;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: var(--blob-lavender);
            bottom: -130px; left: -120px;
            animation: float2 24s ease-in-out infinite;
        }
        .blob-3 {
            width: 340px; height: 340px;
            background: var(--blob-mint);
            top: 38%; left: 18%;
            animation: float3 17s ease-in-out infinite;
        }

        @keyframes float1 {
            0%,100% { transform: translate(0,0) scale(1); }
            35%      { transform: translate(-28px, 44px) scale(1.05); }
            68%      { transform: translate(18px, -22px) scale(0.96); }
        }
        @keyframes float2 {
            0%,100% { transform: translate(0,0) scale(1); }
            40%      { transform: translate(36px, -32px) scale(1.07); }
            72%      { transform: translate(-14px, 22px) scale(0.95); }
        }
        @keyframes float3 {
            0%,100% { transform: translate(0,0) scale(1); }
            50%      { transform: translate(22px, -38px) scale(1.09); }
        }

        /* ── DECORATIVE DOTS ── */
        .dot {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .d1 { width:11px; height:11px; background:#8faae8; opacity:.45; top:27%; right:21%; }
        .d2 { width: 7px; height: 7px; background:#b88ce0; opacity:.38; top:63%; right:29%; }
        .d3 { width: 9px; height: 9px; background:#8faae8; opacity:.32; bottom:24%; right:17%; }
        .d4 { width: 6px; height: 6px; background:#6b8fd4; opacity:.48; top:19%; left:36%; }
        .d5 { width:13px; height:13px; background:#b5d2fa; opacity:.38; bottom:28%; left:26%; }
        .d6 { width: 8px; height: 8px; background:#9bcec8; opacity:.42; top:54%; left:14%; }
        .d7 { width: 5px; height: 5px; background:#c0a0e0; opacity:.35; top:40%; right:12%; }

        /* ── SOCIAL RAIL ── */
        .social-rail {
            position: fixed;
            left: 2.25rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            z-index: 20;
            animation: slideInLeft 0.7s cubic-bezier(0.16,1,0.3,1) 0.5s both;
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateY(-50%) translateX(-16px); }
            to   { opacity: 1; transform: translateY(-50%) translateX(0); }
        }

        .social-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: white;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            color: var(--fb-blue);
            box-shadow: 0 2px 14px rgba(60,60,100,0.1);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }
        .social-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 5px 20px rgba(60,60,100,0.16);
        }

        /* ── CARD ── */
        .card {
            position: relative;
            z-index: 10;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            padding: 3.75rem 3rem 3.25rem;
            max-width: 400px;
            width: calc(100% - 3rem);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.6rem;
            box-shadow:
                0 16px 60px rgba(80,80,140,0.09),
                0 2px 8px rgba(80,80,140,0.06),
                inset 0 1px 0 rgba(255,255,255,0.8);
            animation: cardUp 0.75s cubic-bezier(0.16,1,0.3,1) 0.15s both;
        }

        @keyframes cardUp {
            from { opacity: 0; transform: translateY(32px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ── AVATAR ── */
        .avatar-wrap {
            position: relative;
            display: inline-block;
        }
        .avatar-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(123,156,245,0.35) 0%, rgba(193,124,245,0.35) 100%);
            z-index: 0;
        }
        .avatar {
            position: relative;
            z-index: 1;
            width: 98px; height: 98px;
            border-radius: 50%;
            background: linear-gradient(140deg, #7b9cf5 0%, #c07cf5 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.85rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            color: white;
            box-shadow: 0 8px 28px rgba(110,100,240,0.32);
        }

        /* ── GREETING ── */
        .greeting {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: -0.9rem;
        }

        /* ── BIO ── */
        .bio {
            font-size: 1.02rem;
            font-weight: 300;
            line-height: 1.82;
            color: var(--text-body);
            max-width: 290px;
        }

        /* ── DIVIDER ── */
        .divider {
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(120,120,180,0.25), transparent);
            margin: -0.4rem 0;
        }

        /* ── BUTTON ── */
        .btn-fb {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            background: var(--fb-blue);
            color: white;
            text-decoration: none;
            padding: 0.85rem 2rem;
            border-radius: 100px;
            font-family: 'Figtree', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            box-shadow: 0 5px 22px rgba(24,119,242,0.34);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-fb:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(24,119,242,0.44);
        }
        .btn-fb:active { transform: translateY(-1px); }

        /* ── RESPONSIVE ── */
        @media (max-width: 560px) {
            .social-rail { display: none; }
            .card { padding: 2.75rem 2rem 2.5rem; }
        }
    </style>
</head>
<body>

    <!-- Background atmosphere -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Scattered dots -->
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="dot d4"></div>
    <div class="dot d5"></div>
    <div class="dot d6"></div>
    <div class="dot d7"></div>

    <!-- Left social rail -->
    <nav class="social-rail" aria-label="Social links">
        <a class="social-btn" href="https://www.facebook.com/Zern.Chaiyasit" target="_blank" rel="noopener noreferrer" aria-label="Facebook profile">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
        </a>
    </nav>

    <!-- Main card -->
    <main class="card">
        <div class="avatar-wrap">
            <div class="avatar-ring"></div>
            <div class="avatar">ZC</div>
        </div>

        <p class="greeting">Hello there 👋</p>

        <p class="bio">Just a person who loves connecting with people. Feel free to say hi!</p>

        <div class="divider"></div>

        <a
            class="btn-fb"
            href="https://m.me/Zern.Chaiyasit?text=Hello!%20I'd%20like%20to%20get%20in%20touch%20with%20you."
            target="_blank"
            rel="noopener noreferrer"
        >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white" aria-hidden="true">
                <path d="M12 2C6.477 2 2 6.145 2 11.243c0 2.936 1.42 5.553 3.647 7.284V21l3.316-1.82c.885.245 1.822.377 2.797.377 5.523 0 10-4.145 10-9.257C22 6.145 17.523 2 12 2zm1.078 12.464l-2.545-2.717-4.97 2.717 5.468-5.797 2.606 2.717 4.909-2.717-5.468 5.797z"/>
            </svg>
            Message me on Facebook
        </a>
    </main>

</body>
</html>
